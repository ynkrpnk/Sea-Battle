<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Battle</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="game-container">
      <div class="cell corner"></div>

      <div class="cell label">A</div>
      <div class="cell label">B</div>
      <div class="cell label">C</div>
      <div class="cell label">D</div>
      <div class="cell label">E</div>
      <div class="cell label">F</div>
      <div class="cell label">G</div>
      <div class="cell label">H</div>
      <div class="cell label">I</div>
      <div class="cell label">J</div>

      <div class="board-wrapper">
        <div class="numbers">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
          <div>6</div>
          <div>7</div>
          <div>8</div>
          <div>9</div>
          <div>10</div>
        </div>

        <div class="board">
          <div class="ship purple s1"></div>
          <div class="ship green s2"></div>
          <div class="ship blue s3"></div>
          <div class="ship blue s4"></div>
          <div class="ship green s5"></div>
          <div class="ship purple s6"></div>
          <div class="ship red s7"></div>
          <div class="ship purple s8"></div>
          <div class="ship purple s9"></div>
          <div class="ship green s10"></div>
        </div>
      </div>
    </div>
  </body>
</html>
